<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="470" fill="#f8fafc" rx="14"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b" letter-spacing="-0.3">HybridCommute — Architecture</text>

  <!-- ── Row 1: Browser App ── -->
  <rect x="40" y="48" width="920" height="72" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#4338ca">React App — Browser</text>

  <!-- chips inside browser box -->
  <rect x="120" y="82" width="60" height="24" rx="6" fill="#6366f1"/>
  <text x="150" y="99" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">💬 Chat</text>

  <rect x="196" y="82" width="80" height="24" rx="6" fill="#6366f1"/>
  <text x="236" y="99" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">📊 Data tab</text>

  <rect x="292" y="82" width="76" height="24" rx="6" fill="#6366f1"/>
  <text x="330" y="99" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">⚙️ Settings</text>

  <rect x="660" y="82" width="90" height="24" rx="6" fill="#818cf8"/>
  <text x="705" y="99" text-anchor="middle" font-size="10" fill="#fff" font-weight="500">💾 localStorage</text>

  <!-- ── Vertical arrows Row 1 → Row 2 ── -->
  <line x1="155" y1="120" x2="155" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="390" y1="120" x2="390" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="625" y1="120" x2="625" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="855" y1="120" x2="855" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow labels -->
  <text x="60"  y="160" font-size="9" fill="#64748b">/anthropic/v1/messages</text>
  <text x="296" y="160" font-size="9" fill="#64748b">Direct · CORS-safe</text>
  <text x="536" y="160" font-size="9" fill="#64748b">Direct · API key</text>
  <text x="773" y="160" font-size="9" fill="#64748b">Direct · no key needed</text>

  <!-- ── Row 2: Middleware / Services ── -->

  <!-- Proxy box -->
  <rect x="55"  y="192" width="200" height="80" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Vite Proxy</text>
  <text x="155" y="233" text-anchor="middle" font-size="10" fill="#7c3aed">(local dev)</text>
  <line x1="95" y1="243" x2="215" y2="243" stroke="#ddd6fe" stroke-width="1"/>
  <text x="155" y="258" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Netlify Function</text>
  <text x="155" y="271" text-anchor="middle" font-size="10" fill="#7c3aed">(production)</text>

  <!-- Google Maps box -->
  <rect x="285" y="192" width="210" height="80" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Google Maps SDK</text>
  <text x="390" y="235" text-anchor="middle" font-size="10" fill="#3b82f6">Geocoding API</text>
  <text x="390" y="251" text-anchor="middle" font-size="10" fill="#3b82f6">Distance Matrix API</text>
  <text x="390" y="267" text-anchor="middle" font-size="10" fill="#3b82f6">Traffic-aware routing</text>

  <!-- Google Calendar box -->
  <rect x="520" y="192" width="210" height="80" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="625" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Google Calendar API</text>
  <text x="625" y="235" text-anchor="middle" font-size="10" fill="#3b82f6">Public holiday feed</text>
  <text x="625" y="251" text-anchor="middle" font-size="10" fill="#3b82f6">60-day window</text>
  <text x="625" y="267" text-anchor="middle" font-size="10" fill="#3b82f6">Auto country detection</text>

  <!-- Open-Meteo box -->
  <rect x="755" y="192" width="200" height="80" rx="9" fill="#f0fdfa" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="855" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#0e7490">Open-Meteo</text>
  <text x="855" y="235" text-anchor="middle" font-size="10" fill="#0891b2">7-day weather forecast</text>
  <text x="855" y="251" text-anchor="middle" font-size="10" fill="#0891b2">Rain · Wind · Condition</text>
  <text x="855" y="267" text-anchor="middle" font-size="10" fill="#0891b2">Free — no API key</text>

  <!-- ── Vertical arrow Proxy → Claude ── -->
  <line x1="155" y1="272" x2="155" y2="348" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="60" y="316" font-size="9" fill="#64748b">Injects x-api-key</text>
  <text x="60" y="328" font-size="9" fill="#64748b">Key never in browser</text>

  <!-- ── Row 3: Claude ── -->
  <rect x="55" y="348" width="200" height="80" rx="9" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="373" text-anchor="middle" font-size="11" font-weight="600" fill="#7e22ce">Anthropic Claude API</text>
  <text x="155" y="391" text-anchor="middle" font-size="10" fill="#a855f7">claude-sonnet-4-6</text>
  <text x="155" y="407" text-anchor="middle" font-size="10" fill="#a855f7">Commute recommendations</text>
  <text x="155" y="423" text-anchor="middle" font-size="10" fill="#a855f7">Traffic + Weather + Holidays</text>

  <!-- ── Legend ── -->
  <rect x="55" y="442" width="12" height="12" rx="2" fill="#6366f1"/>
  <text x="73" y="453" font-size="10" fill="#64748b">Browser</text>
  <rect x="145" y="442" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="163" y="453" font-size="10" fill="#64748b">Proxy layer</text>
  <rect x="248" y="442" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="266" y="453" font-size="10" fill="#64748b">Google APIs</text>
  <rect x="350" y="442" width="12" height="12" rx="2" fill="#0891b2"/>
  <text x="368" y="453" font-size="10" fill="#64748b">Weather</text>
  <rect x="432" y="442" width="12" height="12" rx="2" fill="#a855f7"/>
  <text x="450" y="453" font-size="10" fill="#64748b">AI</text>
</svg>
